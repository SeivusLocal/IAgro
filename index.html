<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iAgro - AI Vision Pitch</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #e0ffe0 0%, #c0e0c0 100%);
            color: #333; display: flex; flex-direction: column; min-height: 100vh;
        }
        header {
            background-color: #28a745; color: white; padding: 20px 0;
            text-align: center; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .container {
            max-width: 1000px; margin: 20px auto; padding: 20px;
            background-color: #fff; border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1); flex-grow: 1;
        }
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        .card {
            background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px;
            padding: 20px; display: flex; flex-direction: column;
        }
        .btn {
            background-color: #28a745; color: white; border: none;
            padding: 12px; border-radius: 8px; cursor: pointer;
            font-weight: bold; margin-top: auto; transition: 0.3s;
        }
        .btn:hover { background-color: #218838; }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: #fff; padding: 20px; border-radius: 10px;
            width: 90%; max-width: 500px; text-align: center;
        }
        video, canvas {
            width: 100%; border-radius: 8px; background: #000;
        }
        .progress-container {
            width: 100%; background: #eee; height: 20px;
            border-radius: 10px; margin: 15px 0; overflow: hidden; display: none;
        }
        .progress-bar {
            width: 0%; height: 100%; background: #28a745; transition: 0.2s;
        }
        #cameraResult {
            margin-top: 15px; padding: 15px; border-radius: 8px;
            display: none; text-align: left; font-size: 0.9em;
        }
        .close-btn { float: right; font-size: 24px; cursor: pointer; color: #666; }
    </style>
</head>
<body>

<header>
    <h1>iAgro AI</h1>
    <p>Inteligência Computacional em Tempo Real</p>
</header>

<div class="container">
    <h2>Módulos Operacionais</h2>
    <div class="card-grid">
        <div class="card">
            <h3>Análise de Solo & Folha</h3>
            <p>Identificação espectral de deficiências nutricionais e saúde vegetal via câmera.</p>
            <button class="btn" onclick="openCamera()">Iniciar Diagnóstico</button>
        </div>
        <div class="card" style="opacity: 0.6;">
            <h3>Clima & Mercado</h3>
            <p>Módulo de análise preditiva via satélite (Simulação).</p>
            <button class="btn" disabled>Acessar Dash</button>
        </div>
    </div>
</div>

<div id="cameraModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeCamera()">&times;</span>
        <h3 id="modalTitle">Scanner de Biomassa</h3>
        
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <div class="progress-container" id="progCont">
            <div class="progress-bar" id="progBar"></div>
        </div>

        <div id="cameraResult"></div>

        <div style="margin-top:15px;">
            <button class="btn" id="snap" onclick="takePhoto()">Capturar Imagem</button>
            <button class="btn" id="retry" onclick="resetCamera()" style="display:none; background:#666;">Nova Análise</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const cameraModal = document.getElementById('cameraModal');
    const cameraResult = document.getElementById('cameraResult');
    const progCont = document.getElementById('progCont');
    const progBar = document.getElementById('progBar');
    const btnSnap = document.getElementById('snap');
    const btnRetry = document.getElementById('retry');

    let stream = null;

    async function openCamera() {
        cameraModal.style.display = 'flex';
        resetCamera();
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("Erro ao acessar câmera. Verifique se deu permissão HTTPS.");
        }
    }

    function closeCamera() {
        cameraModal.style.display = 'none';
        if(stream) stream.getTracks().forEach(t => t.stop());
    }

    function resetCamera() {
        video.style.display = 'block';
        canvas.style.display = 'none';
        cameraResult.style.display = 'none';
        progCont.style.display = 'none';
        btnSnap.style.display = 'inline-block';
        btnRetry.style.display = 'none';
    }

    function takePhoto() {
        // Congela o vídeo no canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        video.style.display = 'none';
        canvas.style.display = 'block';
        btnSnap.style.display = 'none';

        // Lógica de Análise de Cor (O coração do Pitch)
        analyzeImage(ctx);
    }

    function analyzeImage(ctx) {
        progCont.style.display = 'block';
        let width = 0;
        
        // Simulação de processamento
        const interval = setInterval(() => {
            width += 5;
            progBar.style.width = width + '%';
            
            if (width >= 100) {
                clearInterval(interval);
                processPixels(ctx);
            }
        }, 50);
    }

    function processPixels(ctx) {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        let greenCount = 0;
        let totalCount = 0;

        for (let i = 0; i < data.length; i += 40) { // Amostragem para performance
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            // Se o verde é dominante
            if (g > r && g > b) greenCount++;
            totalCount++;
        }

        const isGreen = (greenCount / totalCount) > 0.3; // 30% da imagem verde

        cameraResult.style.display = 'block';
        btnRetry.style.display = 'inline-block';

        if (isGreen) {
            cameraResult.style.background = "#eaffea";
            cameraResult.style.borderLeft = "5px solid #28a745";
            cameraResult.innerHTML = `
                <strong>✅ SAÚDE VEGETAL: ÓTIMA</strong><br>
                Elevada concentração de clorofila detectada. <br>
                <em>Recomendação:</em> Manter cronograma de fertirrigação.`;
        } else {
            cameraResult.style.background = "#fff3cd";
            cameraResult.style.borderLeft = "5px solid #ffc107";
            cameraResult.innerHTML = `
                <strong>⚠️ ALERTA DE ESTRESSE</strong><br>
                Anomalia cromática detectada. Possível solo exposto ou deficiência de Nitrogênio.<br>
                <em>Recomendação:</em> Coleta de solo no quadrante B2 para análise laboratorial.`;
        }
    }
</script>

</body>
</html>
